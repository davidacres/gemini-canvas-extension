name: Kickoff phase work

"on":
  workflow_dispatch:
    inputs:
      max_parallel:
        description: "Maximum number of phase PRs to keep open in parallel"
        required: false
        default: "2"
      dry_run:
        description: "If true, report actions without creating branches/PRs"
        required: false
        default: "false"
  issues:
    types:
      - assigned
      - reopened
      - labeled

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: kickoff-phase-work
  cancel-in-progress: false

jobs:
  kickoff:
    runs-on: ubuntu-latest
    steps:
      - name: Start next ready phases
        uses: actions/github-script@v7
        env:
          KICKOFF_ALLOWED_ASSIGNEES: ${{ vars.KICKOFF_ALLOWED_ASSIGNEES }}
        with:
          github-token: ${{ secrets.PLAN_SYNC_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ORCHESTRATOR_LABEL = 'plan-orchestrator';
            const PLAN_SYNC_LABEL = 'plan-sync';
            const BASE_BRANCH = 'plan-base';
            const MAX_PARALLEL_DEFAULT = 2;
            const ALLOWED_ASSIGNEES_DEFAULT = 'copilot';
            const READY_LABELS = new Set(['ready', 'state:ready']);

            function parseCsvList(value, fallbackCsv) {
              const raw = String(value || fallbackCsv || '');
              return raw
                .split(',')
                .map(s => s.trim())
                .filter(Boolean);
            }

            function parseCsvSet(value, fallbackCsv) {
              const raw = String(value || fallbackCsv || '');
              return new Set(
                raw
                  .split(',')
                  .map(s => s.trim().toLowerCase())
                  .filter(Boolean)
              );
            }

            function parseBool(v, fallback = false) {
              if (v == null) return fallback;
              const s = String(v).trim().toLowerCase();
              return s === '1' || s === 'true' || s === 'yes';
            }

            function parseIntSafe(v, fallback) {
              const n = Number.parseInt(String(v ?? ''), 10);
              return Number.isFinite(n) && n > 0 ? n : fallback;
            }

            function milestoneFromLabels(issue) {
              const labels = (issue.labels || []).map(l => (typeof l === 'string' ? l : l?.name)).filter(Boolean);
              const hit = labels.find(n => /^milestone:M\d+$/i.test(n));
              if (!hit) return null;
              return hit.split(':')[1].toUpperCase();
            }

            function depsFromBody(issue) {
              const body = issue.body || '';
              const m = body.match(/<!--\s*dependencies:\s*([^>]*)-->/i);
              if (!m) return [];
              const raw = (m[1] || '').trim();
              if (!raw) return [];
              return raw
                .split(',')
                .map(s => s.trim().toUpperCase())
                .filter(Boolean);
            }

            function slugify(input) {
              return (input || '')
                .toLowerCase()
                .replace(/\[[^\]]+\]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .slice(0, 42) || 'phase-work';
            }

            async function listMilestoneIssues() {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: 'open',
                labels: PLAN_SYNC_LABEL,
                per_page: 100,
              });
              return issues.filter(i => !i.pull_request && milestoneFromLabels(i));
            }

            async function listOpenPhasePrs() {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                base: BASE_BRANCH,
                per_page: 100,
              });
              return prs.filter(pr => String(pr.head?.ref || '').startsWith('phase/'));
            }

            async function getBaseRefSha() {
              const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${BASE_BRANCH}` });
              return ref.data.object.sha;
            }

            async function branchExists(refName) {
              try {
                await github.rest.git.getRef({ owner, repo, ref: `heads/${refName}` });
                return true;
              } catch (e) {
                if (e?.status === 404) return false;
                throw e;
              }
            }

            async function createBranch(refName, sha) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${refName}`,
                sha,
              });
            }

            async function sleep(ms) {
              await new Promise(resolve => setTimeout(resolve, ms));
            }

            async function ensureSeedCommit(refName, milestone, issueNumber, skipCompare = false) {
              // If there are no commits ahead of base, PR creation fails. Seed with a small kickoff file.
              if (!skipCompare) {
                try {
                  const cmp = await github.rest.repos.compareCommits({
                    owner,
                    repo,
                    basehead: `${BASE_BRANCH}...${refName}`,
                  });
                  if ((cmp.data.total_commits || 0) > 0) return;
                } catch (e) {
                  // If compare temporarily fails (ref propagation race), continue and try to seed anyway.
                  if (e?.status !== 404) throw e;
                }
              }

              const path = `.phase-kickoff/${milestone}.md`;
              let existingSha = null;
              let content = [
                `# ${milestone} kickoff`,
                '',
                `Created by kickoff workflow from issue #${issueNumber}.`,
                '',
                `Timestamp: ${new Date().toISOString()}`,
              ].join('\n');

              try {
                const existing = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref: refName,
                });
                if (!Array.isArray(existing.data) && existing.data.sha) {
                  existingSha = existing.data.sha;
                }
              } catch (e) {
                if (e?.status !== 404) throw e;
              }

              for (let attempt = 0; attempt < 3; attempt++) {
                try {
                  await github.rest.repos.createOrUpdateFileContents({
                    owner,
                    repo,
                    path,
                    branch: refName,
                    message: `chore(${milestone}): seed kickoff branch`,
                    content: Buffer.from(content, 'utf8').toString('base64'),
                    ...(existingSha ? { sha: existingSha } : {}),
                  });
                  return;
                } catch (e) {
                  if (e?.status === 404 && attempt < 2) {
                    await sleep(1500);
                    continue;
                  }
                  throw e;
                }
              }
            }
            async function findOpenPrByHead(headRef) {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                head: `${owner}:${headRef}`,
                base: BASE_BRANCH,
                per_page: 10,
              });
              return prs[0] || null;
            }

            async function createPrForIssue(issue, milestone, headRef, orchestratorIssue) {
              const title = `[${milestone}] ${issue.title.replace(/^\[[^\]]+\]\s*/, '')}`;
              const body = [
                `Closes #${issue.number}`,
                orchestratorIssue ? `Related orchestration: #${orchestratorIssue.number}` : null,
                '',
                'Auto-created kickoff PR from orchestrator workflow.',
              ].filter(Boolean).join('\n');

              const created = await github.rest.pulls.create({
                owner,
                repo,
                head: headRef,
                base: BASE_BRANCH,
                title,
                body,
                draft: false,
              });
              return created.data;
            }

            async function addComment(issueNumber, text) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: text });
            }

            async function ensureAssignedToPreferred(issue, preferredAssignee, allowedAssigneesSet) {
              if (!issue?.number || !preferredAssignee) return;
              const current = (issue.assignees || []).map(a => String(a?.login || '').toLowerCase()).filter(Boolean);
              const hasAllowedAssignee = current.some(login => allowedAssigneesSet.has(login));
              if (hasAllowedAssignee) return;

              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: [preferredAssignee],
                });
                core.info(`Assigned issue #${issue.number} to ${preferredAssignee}.`);
              } catch (e) {
                core.warning(`Could not assign issue #${issue.number} to ${preferredAssignee}: ${e.message || e}`);
              }
            }

            const eventName = context.eventName;
            const action = context.payload.action;
            const inputMax = context.payload.inputs?.max_parallel;
            const inputDry = context.payload.inputs?.dry_run;
            const maxParallel = parseIntSafe(inputMax, MAX_PARALLEL_DEFAULT);
            const dryRun = parseBool(inputDry, false);
            const allowedAssigneesList = parseCsvList(process.env.KICKOFF_ALLOWED_ASSIGNEES, ALLOWED_ASSIGNEES_DEFAULT);
            const allowedAssignees = parseCsvSet(process.env.KICKOFF_ALLOWED_ASSIGNEES, ALLOWED_ASSIGNEES_DEFAULT);
            const preferredAssignee = allowedAssigneesList[0] || ALLOWED_ASSIGNEES_DEFAULT;

            let orchestratorIssue = null;
            let forcedIssueNumber = null;

            if (eventName === 'issues') {
              const issue = context.payload.issue;
              const labels = (issue?.labels || []).map(l => l.name);
              const isOrchestrator = labels.includes(ORCHESTRATOR_LABEL);
              const milestone = milestoneFromLabels(issue);
              const isMilestone = labels.includes(PLAN_SYNC_LABEL) && !!milestone;
              const eventLabel = String(context.payload.label?.name || '').toLowerCase();
              const isReadyLabelEvent = action === 'labeled' && READY_LABELS.has(eventLabel);

              if (isOrchestrator) {
                // Kick on assignment, explicit kickoff label, or ready label event.
                const shouldKick = action === 'assigned' || isReadyLabelEvent || labels.includes('kickoff');
                if (!shouldKick) {
                  core.info('Orchestrator event does not request kickoff (assign, ready, or kickoff label).');
                  return;
                }
                orchestratorIssue = issue;
              } else if (isMilestone) {
                // Allow direct task kickoff by assigning a milestone issue.
                const shouldKick = action === 'assigned' || isReadyLabelEvent || labels.includes('kickoff') || labels.includes('ai-start');
                if (!shouldKick) {
                  core.info('Milestone issue event does not request kickoff (assign, ready, kickoff, or ai-start label).');
                  return;
                }

                // Guardrail: only auto-kick milestone assignment for allowed assignees (default: copilot).
                if (action === 'assigned') {
                  const assignedLogin = String(context.payload.assignee?.login || '').toLowerCase();
                  if (!allowedAssignees.has(assignedLogin)) {
                    if (!dryRun) {
                      await addComment(
                        issue.number,
                        `Kickoff skipped: assignment to @${assignedLogin || 'unknown'} is not in allowed assignees (${[...allowedAssignees].join(', ')}).`,
                      );
                    }
                    core.info(`Assigned user ${assignedLogin || '(none)'} is not in allowed kickoff assignees (${[...allowedAssignees].join(', ')}); skipping.`);
                    return;
                  }
                }

                // For label-triggered kickoffs, ensure at least one current assignee is allowed.
                if (!isReadyLabelEvent && action !== 'assigned') {
                  const currentAssignees = (issue?.assignees || []).map(a => String(a?.login || '').toLowerCase()).filter(Boolean);
                  const hasAllowed = currentAssignees.some(login => allowedAssignees.has(login));
                  if (!hasAllowed) {
                    if (!dryRun) {
                      await addComment(
                        issue.number,
                        `Kickoff skipped: no allowed assignee present. Allowed assignees: ${[...allowedAssignees].join(', ')}.`,
                      );
                    }
                    core.info(`Milestone label-triggered kickoff requires an allowed assignee (${[...allowedAssignees].join(', ')}); skipping.`);
                    return;
                  }
                }
                forcedIssueNumber = issue.number;
              } else {
                core.info('Issue event is not for orchestrator or milestone issue; skipping kickoff.');
                return;
              }
            } else {
              const openOrchestrators = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: 'open',
                labels: ORCHESTRATOR_LABEL,
                per_page: 10,
              });
              orchestratorIssue = openOrchestrators.find(i => !i.pull_request) || null;
            }

            const milestoneIssues = await listMilestoneIssues();
            const byMilestone = new Map();
            for (const i of milestoneIssues) {
              const m = milestoneFromLabels(i);
              if (m) byMilestone.set(m, i);
            }

            const openPhasePrs = await listOpenPhasePrs();
            const openMilestones = new Set(
              openPhasePrs
                .map(pr => (String(pr.title || '').match(/\bM\d+\b/i) || [null])[0])
                .filter(Boolean)
                .map(s => String(s).toUpperCase())
            );

            const availableSlots = Math.max(0, maxParallel - openPhasePrs.length);
            if (availableSlots === 0) {
              core.info(`No kickoff slots available (max_parallel=${maxParallel}, open_phase_prs=${openPhasePrs.length}).`);
              return;
            }

            const candidates = milestoneIssues
              .map(i => {
                const milestone = milestoneFromLabels(i);
                const deps = depsFromBody(i);
                const blockedByOpenDep = deps.some(dep => {
                  const depIssue = byMilestone.get(dep);
                  return depIssue && String(depIssue.state || '').toLowerCase() !== 'closed';
                });
                return { issue: i, milestone, deps, blockedByOpenDep };
              })
              .filter(x => x.milestone && !x.blockedByOpenDep && !openMilestones.has(x.milestone))
              .sort((a, b) => {
                const na = Number((a.milestone.match(/\d+/) || [999])[0]);
                const nb = Number((b.milestone.match(/\d+/) || [999])[0]);
                return na - nb;
              });

            let toStart;
            if (forcedIssueNumber != null) {
              const forced = candidates.find(c => c.issue.number === forcedIssueNumber);
              if (!forced) {
                const forcedIssue = milestoneIssues.find(i => i.number === forcedIssueNumber);
                if (forcedIssue && !dryRun) {
                  const forcedMilestone = milestoneFromLabels(forcedIssue) || 'unknown';
                  const deps = depsFromBody(forcedIssue);
                  const blocked = deps.filter(dep => {
                    const depIssue = byMilestone.get(dep);
                    return depIssue && String(depIssue.state || '').toLowerCase() !== 'closed';
                  });
                  let reason = 'task is not currently startable';
                  if (openMilestones.has(forcedMilestone)) {
                    reason = `an open phase PR already exists for ${forcedMilestone}`;
                  } else if (blocked.length) {
                    reason = `blocked by open dependencies: ${blocked.join(', ')}`;
                  }
                  await addComment(forcedIssueNumber, `Kickoff did not start this task yet: ${reason}.`);
                }
                core.info('Forced milestone is not currently dependency-ready.');
                return;
              }

              const remaining = candidates.filter(c => c.issue.number !== forcedIssueNumber);
              toStart = [forced, ...remaining].slice(0, availableSlots);
            } else {
              toStart = candidates.slice(0, availableSlots);
            }
            if (!toStart.length) {
              core.info('No dependency-ready milestone issues available to kickoff.');
              return;
            }

            const baseSha = await getBaseRefSha();
            const results = [];

            for (const entry of toStart) {
              const { issue, milestone } = entry;
              const suffix = slugify(issue.title.replace(/^\[[^\]]+\]\s*/, ''));
              const headRef = `phase/${milestone}-${suffix}`;

              try {
                if (!dryRun) {
                  await ensureAssignedToPreferred(issue, preferredAssignee, allowedAssignees);
                }

                const exists = await branchExists(headRef);
                let createdNow = false;
                if (!exists && !dryRun) {
                  await createBranch(headRef, baseSha);
                  createdNow = true;
                }

                if (!dryRun) {
                  await ensureSeedCommit(headRef, milestone, issue.number, createdNow);
                }
                let pr = await findOpenPrByHead(headRef);
                if (!pr && !dryRun) {
                  pr = await createPrForIssue(issue, milestone, headRef, orchestratorIssue);
                }

                const prRef = pr ? `#${pr.number}` : '(dry-run)';
                results.push(`started ${milestone} -> ${headRef} ${prRef}`);

                if (!dryRun) {
                  await addComment(issue.number, `Kickoff created PR ${pr.html_url} from branch \`${headRef}\`.`);
                }
              } catch (e) {
                results.push(`failed ${milestone}: ${e.message || e}`);
              }
            }

            if (orchestratorIssue && !dryRun) {
              await addComment(
                orchestratorIssue.number,
                ['Kickoff run summary:', ...results.map(r => `- ${r}`)].join('\n'),
              );
            }

            core.summary
              .addHeading('Kickoff results')
              .addList(results)
              .write();
