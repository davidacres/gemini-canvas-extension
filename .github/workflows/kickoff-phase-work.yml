name: Kickoff phase work

"on":
  push:
    branches:
      - main
      - plan-base
    paths:
      - .github/workflows/kickoff-phase-work.yml
      - .github/workflows/execution-controller.yml
      - gemini-canvas-extension.plan.md
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      max_parallel:
        description: "Maximum number of phase PRs to keep open in parallel"
        required: false
        default: "2"
      dry_run:
        description: "If true, report actions without creating branches/PRs"
        required: false
        default: "false"
  issues:
    types:
      - assigned
      - opened
      - reopened
      - edited
      - labeled

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: kickoff-phase-work
  cancel-in-progress: false

jobs:
  kickoff:
    runs-on: ubuntu-latest
    steps:
      - name: Start next ready phases
        uses: actions/github-script@v7
        env:
          KICKOFF_ALLOWED_ASSIGNEES: ${{ vars.KICKOFF_ALLOWED_ASSIGNEES }}
        with:
          github-token: ${{ secrets.PLAN_SYNC_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const COPILOT_WORKER_WORKFLOW = 'copilot-phase-worker.yml';
            const ORCHESTRATOR_LABEL = 'plan-orchestrator';
            const PLAN_SYNC_LABEL = 'plan-sync';
            const BASE_BRANCH = 'plan-base';
            const MAX_PARALLEL_DEFAULT = 2;
            const ALLOWED_ASSIGNEES_DEFAULT = 'copilot';
            const READY_LABELS = new Set(['ready', 'state:ready']);

            const ACTIVE_STATE_LABELS = new Set(['state:in-progress', 'state:in-review']);

            function labelNames(issue) {
              return (issue?.labels || []).map(l => (typeof l === 'string' ? l : l?.name)).filter(Boolean);
            }

            function hasAnyLabel(issue, names) {
              const lowered = new Set([...names].map(name => String(name || '').toLowerCase()));
              return labelNames(issue).some(name => lowered.has(String(name || '').toLowerCase()));
            }

            function parseCsvList(value, fallbackCsv) {
              const raw = String(value || fallbackCsv || '');
              return raw
                .split(',')
                .map(s => s.trim())
                .filter(Boolean);
            }

            function parseCsvSet(value, fallbackCsv) {
              const raw = String(value || fallbackCsv || '');
              return new Set(
                raw
                  .split(',')
                  .map(s => s.trim().toLowerCase())
                  .filter(Boolean)
              );
            }

            function parseBool(v, fallback = false) {
              if (v == null) return fallback;
              const s = String(v).trim().toLowerCase();
              return s === '1' || s === 'true' || s === 'yes';
            }

            function parseIntSafe(v, fallback) {
              const n = Number.parseInt(String(v ?? ''), 10);
              return Number.isFinite(n) && n > 0 ? n : fallback;
            }

            function milestoneFromLabels(issue) {
              const labels = labelNames(issue);
              const hit = labels.find(n => /^milestone:M\d+$/i.test(n));
              if (!hit) return null;
              return hit.split(':')[1].toUpperCase();
            }

            function depsFromBody(issue) {
              const body = issue.body || '';
              const m = body.match(/<!--\s*dependencies:\s*([^>]*)-->/i);
              if (!m) return [];
              const raw = (m[1] || '').trim();
              if (!raw) return [];
              return raw
                .split(',')
                .map(s => s.trim().toUpperCase())
                .filter(Boolean);
            }

            async function listMilestoneIssues() {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: 'open',
                labels: PLAN_SYNC_LABEL,
                per_page: 100,
              });
              return issues.filter(i => !i.pull_request && milestoneFromLabels(i));
            }

            async function listOpenImplementationPrs() {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                base: BASE_BRANCH,
                per_page: 100,
              });
              return prs.filter(pr => {
                const headRef = String(pr.head?.ref || '');
                return headRef.startsWith('phase/') || headRef.startsWith('copilot/');
              });
            }

            async function listMergedImplementationPrs() {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'closed',
                base: BASE_BRANCH,
                per_page: 100,
              });
              return prs.filter(pr => {
                const headRef = String(pr.head?.ref || '');
                return pr.merged_at && (headRef.startsWith('phase/') || headRef.startsWith('copilot/'));
              });
            }

            function milestoneFromPr(pr) {
              const fromTitle = (String(pr?.title || '').match(/\bM\d+\b/i) || [null])[0];
              if (fromTitle) return String(fromTitle).toUpperCase();
              const fromBranch = (String(pr?.head?.ref || '').match(/\bM\d+\b/i) || [null])[0];
              return fromBranch ? String(fromBranch).toUpperCase() : null;
            }

            async function listAssignableAssignees() {
              const assignees = await github.paginate(github.rest.issues.listAssignees, {
                owner,
                repo,
                per_page: 100,
              });
              return new Set(
                assignees
                  .map(assignee => String(assignee?.login || '').toLowerCase())
                  .filter(Boolean)
              );
            }

            async function addComment(issueNumber, text) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: text });
            }

            async function addLabels(issueNumber, labels) {
              if (!labels.length) return;
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels,
              });
            }

            async function removeLabelIfPresent(issueNumber, labelName) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: labelName,
                });
              } catch (e) {
                if (e?.status !== 404) throw e;
              }
            }

            async function dispatchWorkflow(workflowId, ref, inputs) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref,
                inputs,
              });
            }

            async function ensureAssignedToPreferred(issue, preferredAssignee, allowedAssigneesSet, assignableAssigneesSet) {
              if (!issue?.number || !preferredAssignee) {
                return { assigned: false, verified: false, preferredUnavailable: false };
              }

              const preferredLogin = String(preferredAssignee || '').toLowerCase();
              const current = (issue.assignees || []).map(a => String(a?.login || '').toLowerCase()).filter(Boolean);
              if (current.includes(preferredLogin)) {
                return { assigned: true, verified: true, preferredUnavailable: false };
              }

              const hasAllowedAssignee = current.some(login => allowedAssigneesSet.has(login));
              if (hasAllowedAssignee) {
                return { assigned: false, verified: true, preferredUnavailable: false };
              }

              if (!assignableAssigneesSet.has(preferredLogin)) {
                core.warning(`Preferred assignee ${preferredAssignee} is not assignable via the repository issues API.`);
                return { assigned: false, verified: false, preferredUnavailable: true };
              }

              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: [preferredAssignee],
                });
                const refreshed = await github.rest.issues.get({ owner, repo, issue_number: issue.number });
                const refreshedAssignees = (refreshed.data.assignees || [])
                  .map(assignee => String(assignee?.login || '').toLowerCase())
                  .filter(Boolean);

                if (refreshedAssignees.includes(preferredLogin)) {
                  core.info(`Assigned issue #${issue.number} to ${preferredAssignee}.`);
                  return { assigned: true, verified: true, preferredUnavailable: false };
                }

                core.warning(`GitHub accepted assignment for issue #${issue.number}, but ${preferredAssignee} is not present in the resulting issue assignees.`);
                return { assigned: false, verified: false, preferredUnavailable: true };
              } catch (e) {
                core.warning(`Could not assign issue #${issue.number} to ${preferredAssignee}: ${e.message || e}`);
                return { assigned: false, verified: false, preferredUnavailable: true };
              }
            }

            const eventName = context.eventName;
            const action = context.payload.action;
            const inputMax = context.payload.inputs?.max_parallel;
            const inputDry = context.payload.inputs?.dry_run;
            const maxParallel = parseIntSafe(inputMax, MAX_PARALLEL_DEFAULT);
            const dryRun = parseBool(inputDry, false);
            const allowedAssigneesList = parseCsvList(process.env.KICKOFF_ALLOWED_ASSIGNEES, ALLOWED_ASSIGNEES_DEFAULT);
            const allowedAssignees = parseCsvSet(process.env.KICKOFF_ALLOWED_ASSIGNEES, ALLOWED_ASSIGNEES_DEFAULT);
            const preferredAssignee = allowedAssigneesList[0] || ALLOWED_ASSIGNEES_DEFAULT;
            const assignableAssignees = await listAssignableAssignees();

            let orchestratorIssue = null;
            let forcedIssueNumber = null;

            if (eventName === 'issues') {
              const issue = context.payload.issue;
              const labels = (issue?.labels || []).map(l => l.name);
              const isOrchestrator = labels.includes(ORCHESTRATOR_LABEL);
              const milestone = milestoneFromLabels(issue);
              const isMilestone = labels.includes(PLAN_SYNC_LABEL) && !!milestone;
              const eventLabel = String(context.payload.label?.name || '').toLowerCase();
              const isReadyLabelEvent = action === 'labeled' && READY_LABELS.has(eventLabel);

              if (isOrchestrator) {
                // Kick only from explicit orchestration signals. Assignment is ignored so Copilot
                // does not start implementation work from the parent orchestration issue.
                const shouldKick = action !== 'assigned';
                if (!shouldKick) {
                  core.info('Orchestrator assignment does not request kickoff; other orchestrator events do.');
                  return;
                }

                if (!dryRun) {
                  await ensureAssignedToPreferred(issue, preferredAssignee, allowedAssignees, assignableAssignees);
                }
                orchestratorIssue = issue;
              } else if (isMilestone) {
                // Allow direct task kickoff by assigning a milestone issue.
                const isAiStartLabelEvent = action === 'labeled' && eventLabel === 'ai-start';
                const shouldKick = action === 'assigned' || isReadyLabelEvent || labels.includes('kickoff') || labels.includes('ai-start');
                if (!shouldKick) {
                  core.info('Milestone issue event does not request kickoff (assign, ready, kickoff, or ai-start label).');
                  return;
                }

                // Guardrail: only auto-kick milestone assignment for allowed assignees (default: copilot).
                if (action === 'assigned') {
                  const assignedLogin = String(context.payload.assignee?.login || '').toLowerCase();
                  if (!allowedAssignees.has(assignedLogin)) {
                    if (!dryRun) {
                      await addComment(
                        issue.number,
                        `Kickoff skipped: assignment to @${assignedLogin || 'unknown'} is not in allowed assignees (${[...allowedAssignees].join(', ')}).`,
                      );
                    }
                    core.info(`Assigned user ${assignedLogin || '(none)'} is not in allowed kickoff assignees (${[...allowedAssignees].join(', ')}); skipping.`);
                    return;
                  }
                }

                // For label-triggered kickoffs, ensure at least one current assignee is allowed.
                if (!isReadyLabelEvent && !isAiStartLabelEvent && action !== 'assigned') {
                  const currentAssignees = (issue?.assignees || []).map(a => String(a?.login || '').toLowerCase()).filter(Boolean);
                  const hasAllowed = currentAssignees.some(login => allowedAssignees.has(login));
                  if (!hasAllowed) {
                    if (!dryRun) {
                      await addComment(
                        issue.number,
                        `Kickoff skipped: no allowed assignee present. Allowed assignees: ${[...allowedAssignees].join(', ')}.`,
                      );
                    }
                    core.info(`Milestone label-triggered kickoff requires an allowed assignee (${[...allowedAssignees].join(', ')}); skipping.`);
                    return;
                  }
                }
                forcedIssueNumber = issue.number;
              } else {
                core.info('Issue event is not for orchestrator or milestone issue; skipping kickoff.');
                return;
              }
            } else {
              const openOrchestrators = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: 'open',
                labels: ORCHESTRATOR_LABEL,
                per_page: 10,
              });
              orchestratorIssue = openOrchestrators.find(i => !i.pull_request) || null;

              if (!orchestratorIssue && eventName !== 'workflow_dispatch') {
                core.info(`No open orchestrator issue found for ${eventName}; skipping automatic kickoff.`);
                return;
              }

              if (orchestratorIssue && !dryRun) {
                await ensureAssignedToPreferred(orchestratorIssue, preferredAssignee, allowedAssignees, assignableAssignees);
              }
            }

            const milestoneIssues = await listMilestoneIssues();
            const byMilestone = new Map();
            for (const i of milestoneIssues) {
              const m = milestoneFromLabels(i);
              if (m) byMilestone.set(m, i);
            }

            const openImplementationPrs = await listOpenImplementationPrs();
            const mergedImplementationPrs = await listMergedImplementationPrs();
            const openPrMilestones = new Set(
              openImplementationPrs
                .map(pr => (String(pr.title || '').match(/\bM\d+\b/i) || [null])[0])
                .filter(Boolean)
                .map(s => String(s).toUpperCase())
            );
            const activeIssueMilestones = new Set(
              milestoneIssues
                .filter(issue => hasAnyLabel(issue, ACTIVE_STATE_LABELS))
                .map(issue => milestoneFromLabels(issue))
                .filter(Boolean)
            );
            const activeMilestones = new Set([...openPrMilestones, ...activeIssueMilestones]);
            const completedMilestones = new Set(
              mergedImplementationPrs
                .map(pr => milestoneFromPr(pr))
                .filter(Boolean)
            );

            const availableSlots = Math.max(0, maxParallel - activeMilestones.size);
            if (availableSlots === 0) {
              core.info(`No kickoff slots available (max_parallel=${maxParallel}, active_milestones=${activeMilestones.size}).`);
              return;
            }

            const candidates = milestoneIssues
              .map(i => {
                const milestone = milestoneFromLabels(i);
                const deps = depsFromBody(i);
                const blockedByUnmergedDep = deps.some(dep => !completedMilestones.has(dep));
                return { issue: i, milestone, deps, blockedByUnmergedDep };
              })
              .filter(x => x.milestone && !x.blockedByUnmergedDep && !activeMilestones.has(x.milestone))
              .sort((a, b) => {
                const na = Number((a.milestone.match(/\d+/) || [999])[0]);
                const nb = Number((b.milestone.match(/\d+/) || [999])[0]);
                return na - nb;
              });

            let toStart;
            if (forcedIssueNumber != null) {
              const forcedIssue = milestoneIssues.find(i => i.number === forcedIssueNumber) || null;
              const forcedMilestone = forcedIssue ? milestoneFromLabels(forcedIssue) : null;
              if (forcedMilestone && activeMilestones.has(forcedMilestone)) {
                core.info(`Forced milestone ${forcedMilestone} already has active phase work; skipping duplicate kickoff.`);
                return;
              }

              const forced = candidates.find(c => c.issue.number === forcedIssueNumber);
              if (!forced) {
                if (forcedIssue && !dryRun) {
                  const unresolvedMilestone = milestoneFromLabels(forcedIssue) || 'unknown';
                  const deps = depsFromBody(forcedIssue);
                  const blocked = deps.filter(dep => {
                    const depIssue = byMilestone.get(dep);
                    return depIssue && String(depIssue.state || '').toLowerCase() !== 'closed';
                  });
                  let reason = 'task is not currently startable';
                  if (activeMilestones.has(unresolvedMilestone)) {
                    reason = `phase work is already active for ${unresolvedMilestone}`;
                  } else if (blocked.length) {
                    reason = `blocked by open dependencies: ${blocked.join(', ')}`;
                  }
                  await addComment(forcedIssueNumber, `Kickoff did not start this task yet: ${reason}.`);
                }
                core.info('Forced milestone is not currently dependency-ready.');
                return;
              }

              const remaining = candidates.filter(c => c.issue.number !== forcedIssueNumber);
              toStart = [forced, ...remaining].slice(0, availableSlots);
            } else {
              toStart = candidates.slice(0, availableSlots);
            }
            if (!toStart.length) {
              core.info('No dependency-ready milestone issues available to kickoff.');
              return;
            }

            const results = [];

            for (const entry of toStart) {
              const { issue, milestone } = entry;

              try {
                let assignmentResult = { assigned: false, verified: false, preferredUnavailable: false };

                if (!dryRun) {
                  assignmentResult = await ensureAssignedToPreferred(issue, preferredAssignee, allowedAssignees, assignableAssignees);
                  await removeLabelIfPresent(issue.number, 'state:ready');
                  await addLabels(issue.number, ['state:in-progress']);
                  await dispatchWorkflow(COPILOT_WORKER_WORKFLOW, BASE_BRANCH, {
                    issue_number: String(issue.number),
                    milestone,
                    base_branch: BASE_BRANCH,
                    dry_run: 'false',
                  });
                }

                results.push(`queued ${milestone} via Copilot worker`);

                if (!dryRun) {
                  const guidance = [
                    `Kickoff queued the Copilot phase worker for ${milestone}.`,
                    `Copilot should open an implementation PR into \`${BASE_BRANCH}\` with \`Closes #${issue.number}\` in the PR body.`,
                    assignmentResult.preferredUnavailable
                      ? `Preferred assignee \`${preferredAssignee}\` is not assignable via the repository issues API, so the workflow used a Copilot task dispatch instead of relying on issue assignment.`
                      : null,
                    orchestratorIssue ? `Related orchestration: #${orchestratorIssue.number}.` : null,
                  ].filter(Boolean).join(' ');
                  await addComment(issue.number, guidance);
                }
              } catch (e) {
                if (!dryRun) {
                  await removeLabelIfPresent(issue.number, 'state:in-progress');
                  await addLabels(issue.number, ['state:ready']);
                  await addComment(issue.number, `Kickoff could not queue the Copilot phase worker yet: ${e.message || e}`);
                }
                results.push(`failed ${milestone}: ${e.message || e}`);
              }
            }

            if (orchestratorIssue && !dryRun) {
              await addComment(
                orchestratorIssue.number,
                ['Kickoff run summary:', ...results.map(r => `- ${r}`)].join('\n'),
              );
            }

            core.summary
              .addHeading('Kickoff results')
              .addList(results)
              .write();
