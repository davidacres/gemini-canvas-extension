name: Apply branch protection
# No-op metadata line to allow push-triggered reapplication when needed.

"on":
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/apply-branch-protection.yml

permissions:
  contents: read

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Apply protection to plan-base and main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PLAN_SYNC_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function applyProtection(branch, body) {
              await github.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection', {
                owner,
                repo,
                branch,
                headers: {
                  'X-GitHub-Api-Version': '2022-11-28',
                },
                ...body,
              });
            }

            const shared = {
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false,
                required_approving_review_count: 0,
                require_last_push_approval: false,
              },
              restrictions: null,
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: true,
              lock_branch: false,
              allow_fork_syncing: true,
            };

            await applyProtection('plan-base', {
              ...shared,
              required_status_checks: {
                strict: true,
                contexts: ['Quality (ubuntu-latest)'],
              },
            });

            await applyProtection('main', {
              ...shared,
              required_status_checks: {
                strict: true,
                contexts: ['Quality (ubuntu-latest)'],
              },
            });

            core.info('Applied branch protection to plan-base and main.');
