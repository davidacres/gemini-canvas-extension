name: Phase automerge

"on":
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: phase-automerge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  enable:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.base.ref == 'plan-base' && startsWith(github.event.pull_request.head.ref, 'phase/')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for phase PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PLAN_SYNC_TOKEN || github.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request in payload.');
              return;
            }

            if (pr.draft) {
              core.info('PR is draft; auto-merge not enabled.');
              return;
            }

            const mutation = `mutation($pullRequestId:ID!) {
              enablePullRequestAutoMerge(input:{ pullRequestId:$pullRequestId, mergeMethod:SQUASH }) {
                pullRequest { number }
              }
            }`;

            try {
              await github.graphql(mutation, { pullRequestId: pr.node_id });
              core.info(`Auto-merge enabled for PR #${pr.number}`);
            } catch (e) {
              core.warning(`Could not enable auto-merge for PR #${pr.number}: ${e.message || e}`);
            }
